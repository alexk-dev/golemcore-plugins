name: Release Shared APIs

on:
  push:
    branches:
      - main
    paths:
      - pom.xml
      - extension-api/**
      - runtime-api/**
  workflow_dispatch:
    inputs:
      force_publish:
        description: Publish even when the current shared API version is already in Maven Central
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-shared-apis
  cancel-in-progress: false

jobs:
  publish_shared_apis:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_KEY_ID: ${{ secrets.MAVEN_GPG_KEY_ID }}
    steps:
      - name: Checkout plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load repository build settings
        id: repo
        run: python3 scripts/plugins_repo.py repo-settings --github-output "$GITHUB_OUTPUT"

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.repo.outputs.java_version }}
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD

      - name: Validate publishing secrets
        shell: bash
        run: |
          for secret_name in CENTRAL_TOKEN_USERNAME CENTRAL_TOKEN_PASSWORD MAVEN_GPG_PRIVATE_KEY MAVEN_GPG_KEY_ID; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Resolve shared API version
        id: version
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import xml.etree.ElementTree as et
          from pathlib import Path

          ns = {"m": "http://maven.apache.org/POM/4.0.0"}
          root = Path(".")

          def read_version(path: str) -> str:
              pom = et.parse(root / path).getroot()
              version = pom.find("m:version", ns)
              if version is None or version.text is None or not version.text.strip():
                  raise SystemExit(f"Missing version in {path}")
              return version.text.strip()

          extension = read_version("extension-api/pom.xml")
          runtime = read_version("runtime-api/pom.xml")
          if extension != runtime:
              raise SystemExit(
                  f"Shared API versions do not match: extension-api={extension}, runtime-api={runtime}"
              )
          print(f"version={extension}")
          PY

      - name: Check Maven Central availability
        id: availability
        shell: bash
        env:
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_publish || 'false' }}
        run: |
          version="${{ steps.version.outputs.version }}"
          extension_url="https://repo1.maven.org/maven2/me/golemcore/plugins/golemcore-plugin-extension-api/${version}/golemcore-plugin-extension-api-${version}.jar"
          runtime_url="https://repo1.maven.org/maven2/me/golemcore/plugins/golemcore-plugin-runtime-api/${version}/golemcore-plugin-runtime-api-${version}.jar"

          missing=0
          for url in "$extension_url" "$runtime_url"; do
            if curl -fsI "$url" >/dev/null; then
              echo "Already published: $url"
            else
              echo "Not published yet: $url"
              missing=1
            fi
          done

          if [[ "${FORCE_PUBLISH}" == "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual force publish requested" >> "$GITHUB_OUTPUT"
          elif (( missing == 1 )); then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=current shared API version is not yet published" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=current shared API version is already published" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG private key
        if: steps.availability.outputs.should_publish == 'true'
        shell: bash
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys --keyid-format LONG "$MAVEN_GPG_KEY_ID"

      - name: Publish shared APIs to Maven Central
        if: steps.availability.outputs.should_publish == 'true'
        shell: bash
        run: |
          mvn -B -ntp \
            -f pom.xml \
            -pl extension-api,runtime-api \
            -am \
            -P central-publish \
            -Dgpg.keyname="$MAVEN_GPG_KEY_ID" \
            deploy

      - name: Skip publish
        if: steps.availability.outputs.should_publish != 'true'
        shell: bash
        run: |
          echo "Skipping shared API publish: ${{ steps.availability.outputs.reason }}."
          echo "Current version: ${{ steps.version.outputs.version }}"

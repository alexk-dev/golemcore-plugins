name: Conventional Commits

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve revision range
        id: range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "rev_range=FETCH_HEAD..HEAD" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse "${{ github.sha }}^" >/dev/null 2>&1; then
              echo "rev_range=${{ github.sha }}^..${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "rev_range=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "rev_range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Validate commit subjects
        run: python3 scripts/plugins_repo.py lint-commits --rev-range "${{ steps.range.outputs.rev_range }}"
